# docker/nginx.conf — Nginx → PHP-FPM (contenedor app)
# El bloque HTTPS se activa después de emitir el primer certificado (ver DOCKER-README.md).

server {
    listen 80;
    server_name api.aguteobabys.cl;

    # Challenge de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás a HTTPS (comentar estas 3 líneas hasta tener el primer certificado)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.aguteobabys.cl;

    ssl_certificate     /etc/letsencrypt/live/api.aguteobabys.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aguteobabys.cl/privkey.pem;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 25m;   # subida de imágenes de producto desde Filament

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Imágenes de producto (volumen storage)
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 30d;
        access_log off;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
