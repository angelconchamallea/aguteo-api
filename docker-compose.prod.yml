# docker-compose.prod.yml — aguteo-api en Vultr Santiago
# Deploy: git pull && docker compose -f docker-compose.prod.yml up -d --build
# El .env de producción vive SOLO en el servidor (junto a este archivo).

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      MIGRATE_ON_BOOT: "true"
    volumes:
      - storage:/var/www/html/storage/app/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage:/var/www/html/storage/app/public:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on: [app]
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]
    # SIN ports: la DB jamás se expone a internet. Acceso solo vía red interna
    # o túnel SSH: ssh -L 5432:localhost:5432 + docker compose exec postgres psql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks: [internal]

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage:/var/www/html/storage/app/public
    depends_on: [app, redis]
    networks: [internal]

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: php artisan schedule:work
    depends_on: [app]
    networks: [internal]

  # Renovación SSL automática (certbot emite/renueva, nginx sirve el challenge)
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot

networks:
  internal:

volumes:
  pgdata:        # CRÍTICO: datos de la tienda. Backup diario hacia fuera del servidor.
  redisdata:
  storage:       # CRÍTICO: imágenes de productos subidas desde Filament.
  certbot-certs:
  certbot-www:
